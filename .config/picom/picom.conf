# --- Backend Settings ---
backend = "glx";
vsync = true;
glx-copy-from-front = false;

# --- Opacity ---
active-opacity = 1.0;
inactive-opacity = 0.8;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Detect '_NET_WM_WINDOW_OPACITY' on client windows
# This allows external tools to set opacity
detect-client-opacity = true;

# --- Fading (Optional, makes the transition smooth) ---
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Corners & Shadows (Optional) ---
corner-radius = 8;
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;

# --- Exclusions ---
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'"
];