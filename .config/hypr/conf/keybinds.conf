###################
### KEYBINDINGS ###
###################


bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
# bind = ALT, M, exec, $toggle_microphone
bind = $mainMod, A, exec, $audiosettings
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, A, exec, $tmenu
bind = ALT, E, exec, emacs
bind = ALT, T, exec, twitter
bind = ALT, Y, exec, youtube
bind = $mainMod, B, exec, zen-browser
bind = ALT, B, exec, google-chrome-stable
bind = $mainMod, P, exec, $colorPicker | wl-copy
bind = $mainMod, J, togglesplit, # dwindle
bind = SUPER, F, fullscreen

bind = $mainMod, L, exec, hyprlock

bind = $mainMod, N, exec, ~/.config/waybar/scripts/notification_center.sh

bind = $mainMod, C, exec, $codeditor

# CLock
bind = ALT, C, exec, kitty peaclock

# Grouped (tabbed) layout
bind = $mainMod, G, togglegroup

# switch windows in tab group
bind = $mainMod, left, changegroupactive, b
bind = $mainMod, right, changegroupactive, f
bind = $mainMod, Tab, changegroupactive, b

bind = $mainMod, Z, exec, coomer


# Clipboard
bind = SUPER, V, exec, cliphist list | tofi -c ~/.config/tofi/configV | cliphist decode | wl-copy

# timer
bind = $mainMod, t, exec, cg-timer

# Direct Power Controls
bind = $mainMod SHIFT, X, exec, hyprctl dispatch exit
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod SHIFT, R, exec, systemctl reboot
bind = $mainMod SHIFT, P, exec, systemctl poweroff

bind = ALT, R, exec, hyprctl keyword decoration:rounding 20

# Quick System Controls
bind = $mainMod, M, exec, swayosd-client --output-volume mute-toggle

# wallpaper
bind = $mainMod, W, exec, waypaper
bind = , F2, exec, $wallpaper_selector

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window -o ~/Pictures/screenshots -f $(date +%Y-%m-%d_%H-%M-%S).png
# Screenshot a monitor
bind = , PRINT, exec, flameshot gui

bind = SHIFT, PRINT, exec, hyprshot -m region -o ~/Pictures/screenshots -f $(date +%Y-%m-%d_%H-%M-%S).png

bind = Ctrl, Escape, exec, killall waybar || waybar # toggle waybar
bind = SUPER, ESCAPE, exec, wlogout


bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
bind = $mainMod SHIFT, down, layoutmsg, movewindowto d

# Hyprscrolling keybindings
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, movewindowto r
bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l

# Resize windows with mainMod + CTRL + arrow keys
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces with mainMod + arrow keys
bind = $mainMod ALT, right, workspace, e+1
bind = $mainMod ALT, left, workspace, e-1
bind = ALT, Tab, workspace, e-1




# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = , F1, exec, killall gammastep || gammastep -O 3500 # toggle night-mode
bind = , F3, exec, brightnessctl set 100%+

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , F4, exec, $camera
bind = , F5, exec, swayosd-client --brightness -5
bind = , F6, exec, swayosd-client --brightness +5

# Laptop multimedia keys for volume and LCD brightness
bind = , F9, exec, swayosd-client --output-volume 2
bind = , F8, exec, swayosd-client --output-volume lower --device alsa_output.pci-0000_11_00.4.analog-stereo.monitor
bind = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send -u normal -t 1000 "Michrophone" "toggled"

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Opacity Controls
bind = $mainMod, bracketleft, exec, hyprctl dispatch setprop active opacity 0.88
bind = $mainMod, bracketright, exec, hyprctl dispatch setprop active opacity 1.0
