[bar/toph]
monitor = eDP-1
; width = 80%
height = 25px
radius = 0
; offset-x = 10%

dpi = 73

background = ${colors.gruber-darker-yellow}
foreground = ${colors.gruber-darker-yellow}

; bottom = true

line-size = 1pt

border-size = 1pt
border-color = ${colors.gruber-darker-yellow}

padding-left = 0
padding-right = 0

module-margin = 1

separator = |
separator-foreground = ${colors.gruber-darker-yellow}

font-0 = IosevkaTerm Nerd Font:size=15


modules-left = xworkspaces xwindow
modules-center = date
modules-right =  microphone-input pulseaudio battery cpu memory uptime systray


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = false

[module/systray]
type = internal/tray

; Available tags:
;   <label-toggle> (default)
;   <tray> (default)
format-margin = 0pt
tray-spacing = 1pt
tray-padding = 1pt

; Tray icon max size
tray-size = 66%

; Background color for tray container
; Note: 32-bit alpha blending is not supported
; Use `tray-background = 0` to disable transparency
tray-background = ${colors.gruber-darker-bg}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.gruber-darker-yellow}
label-active-foreground = ${colors.gruber-darker-bg}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.gruber-darker-red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.gruber-darker-yellow}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:10:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.gruber-darker-yellow}


[module/dunst]
type = custom/ipc
initial = 1
format-foreground = ${colors.gruber-darker-yellow}

hook-0 = echo "%{A1:dunstctl set-paused true && polybar-msg hook dunst 2:}%{A}" &
hook-1 = echo "%{A1:dunstctl set-paused false && polybar-msg hook dunst 1:}%{A}" &

[module/microphone]
type = custom/script
exec = ~/.config/polybar/mic-volume.sh
interval = 2

format-prefix = "MIC: "
format-prefix-foreground = ${colors.gruber-darker-yellow}
label = %output%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL: "
format-volume-prefix-foreground = ${colors.gruber-darker-yellow}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.gruber-darker-red}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.gruber-darker-yellow}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.gruber-darker-yellow}
label-indicator-background = ${colors.gruber-darker-yellow}


[module/microphone-input]
type = custom/script
exec = ~/.config/polybar/mic-input.sh
interval = 2

format-prefix = "MIC:"
format-prefix-foreground = ${colors.gruber-darker-yellow}
label = %output%

click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle
scroll-up = pactl set-source-volume @DEFAULT_SOURCE@ +5%
scroll-down = pactl set-source-volume @DEFAULT_SOURCE@ -5%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM: "
format-prefix-foreground = ${colors.gruber-darker-yellow}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/intel-gpu]
type = custom/script
exec = ~/.config/polybar/scripts/intel-gpu-usage.sh
interval = 5
format-prefix = "GPU "
format-prefix-foreground = ${colors.gruber-darker-yellow}
label = %output%

[module/battery]
type = internal/battery
; Use the first battery found on the system
battery = BAT0
adapter = AC
full-at = 98
low-at = 20
poll-interval = 5

; Format based on state
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <animation-low> <label-low>

; Labels
label-charging = %percentage%%
label-discharging = %percentage%%
label-full =   %percentage%%
label-full-foreground = ${colors.gruber-darker-yellow}
label-low =   %percentage%%
label-low-foreground = ${colors.gruber-darker-red}

; Charging animation
animation-charging-0 =  
animation-charging-1 =  
animation-charging-2 =  
animation-charging-3 =  
animation-charging-4 =  
animation-charging-foreground = ${colors.gruber-darker-yellow}
animation-charging-framerate = 750

; Discharging ramp
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.gruber-darker-yellow}

; Low battery animation
animation-low-0 = 
animation-low-1 = 
animation-low-0-foreground = ${colors.gruber-darker-red}
animation-low-1-foreground = ${colors.gruber-darker-red}
animation-low-framerate = 200

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface = wlan0

format-connected = <ramp-signal> <label-connected>
format-connected-foreground = {$colors.gruber-darker-yellow}
; label-connected = %essid%

format-disconnected = down
format-disconnected-foreground = ${colors.gruber-darker-red}


ramp-signal-0 = 󰕸
ramp-signal-1 = 󰕹
ramp-signal-2 = 󰕺
ramp-signal-3 = 󰕻
ramp-signal-foreground = ${colors.gruber-darker-yellow}


; [module/bluetooth]
; type = custom/text
; content = "BLU"
; click-left = blueberry
; content-padding = 0
;
[module/load]
type = internal/cpu
interval = 1
format = "Load: <label>"
label = %load_avg_1min%

; [module/eth]
; inherit = network-base
; interface-type = wired
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/uptime]
type = custom/script
exec = awk '{printf "%dh %dm", int($1/3600), int($1%3600/60)}' /proc/uptime
interval = 60
format-prefix = "UpT: "
format-prefix-foreground = ${colors.gruber-darker-yellow}
label = %output%

[module/date]
type = internal/date
interval = 1

date = %I:%M:%S %p | %d,%m,%a
; date = %I:%M:%S %p | %D %
; date-alt = %Y-%m-%d %I:%M:%S %p

label = %date%
label-foreground = ${colors.gruber-darker-yellow}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
