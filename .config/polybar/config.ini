[colors]
background = ${colors.gruber-darker-bg}
background-alt = ${colors.gruber-darker-yellow}
foreground = ${colors.gruber-darker-yellow}
primary = ${colors.gruber-darker-yellow}
secondary = ${colors.gruber-darker-yellow}
alert = ${colors.gruber-darker-red}
disabled = ${colors.gruber-darker-red-1}

[bar/toph]
monitor = eDP-1
; width = 80%
height = 25px
radius = 0
; offset-x = 10%

dpi = 73

background = ${colors.background}
foreground = ${colors.foreground}

; bottom = true

line-size = 1pt

border-size = 1pt
border-color = ${colors.surface1}

padding-left = 0
padding-right = 0

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}

font-0 = IosevkaTerm Nerd Font:size=15


modules-left = xworkspaces xwindow
modules-center = date
modules-right =  microphone-input pulseaudio battery cpu memory uptime systray


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = false

[module/systray]
type = internal/tray

; Available tags:
;   <label-toggle> (default)
;   <tray> (default)
format-margin = 0pt
tray-spacing = 1pt
tray-padding = 1pt

; Tray icon max size
tray-size = 66%

; Background color for tray container
; Note: 32-bit alpha blending is not supported
; Use `tray-background = 0` to disable transparency
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline= ${colors.lavender}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:10:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


[module/dunst]
type = custom/ipc
initial = 1
format-foreground = ${colors.yellow}

hook-0 = echo "%{A1:dunstctl set-paused true && polybar-msg hook dunst 2:}ÔÉ≥%{A}" &
hook-1 = echo "%{A1:dunstctl set-paused false && polybar-msg hook dunst 1:}Ôá∂%{A}" &

[module/microphone]
type = custom/script
exec = ~/.config/polybar/mic-volume.sh
interval = 2

format-prefix = "MIC: "
format-prefix-foreground = ${colors.primary}
label = %output%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL: "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}


[module/microphone-input]
type = custom/script
exec = ~/.config/polybar/mic-input.sh
interval = 2

format-prefix = "MIC"
format-prefix-foreground = ${colors.primary}
label = %output%

click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle
scroll-up = pactl set-source-volume @DEFAULT_SOURCE@ +5%
scroll-down = pactl set-source-volume @DEFAULT_SOURCE@ -5%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/intel-gpu]
type = custom/script
exec = ~/.config/polybar/scripts/intel-gpu-usage.sh
interval = 5
format-prefix = "GPU "
format-prefix-foreground = ${colors.primary}
label = %output%

