[module/battery]
type = internal/battery
; Use the first battery found on the system
battery = BAT0
adapter = AC
full-at = 98
low-at = 20
poll-interval = 5

; Format based on state
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <animation-low> <label-low>

; Labels
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔâÄ  %percentage%%
label-full-foreground = ${colors.green}
label-low = ÔÑÉ  %percentage%%
label-low-foreground = ${colors.red}

; Charging animation
animation-charging-0 =  ÔâÑ
animation-charging-1 =  ÔâÉ
animation-charging-2 =  ÔâÇ
animation-charging-3 =  ÔâÅ
animation-charging-4 =  ÔâÄ
animation-charging-foreground = ${colors.yellow}
animation-charging-framerate = 750

; Discharging ramp
ramp-capacity-0 = ÔâÑ
ramp-capacity-1 = ÔâÉ
ramp-capacity-2 = ÔâÇ
ramp-capacity-3 = ÔâÅ
ramp-capacity-4 = ÔâÄ
ramp-capacity-foreground = ${colors.lavender}

; Low battery animation
animation-low-0 = ÔâÑ
animation-low-1 = ÔâÄ
animation-low-0-foreground = ${colors.red}
animation-low-1-foreground = ${colors.red}
animation-low-framerate = 200

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface = wlan0

format-connected = <ramp-signal> <label-connected>
format-connected-foreground = {$colors.primary}
; label-connected = %essid%

format-disconnected = down
format-disconnected-foreground = ${colors.red}


ramp-signal-0 = Û∞ï∏
ramp-signal-1 = Û∞ïπ
ramp-signal-2 = Û∞ï∫
ramp-signal-3 = Û∞ïª
ramp-signal-foreground = ${colors.sky}


; [module/bluetooth]
; type = custom/text
; content = "BLU"
; click-left = blueberry
; content-padding = 0
;
[module/load]
type = internal/cpu
interval = 1
format = "Load: <label>"
label = %load_avg_1min%

; [module/eth]
; inherit = network-base
; interface-type = wired
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/uptime]
type = custom/script
exec = awk '{printf "%dh %dm", int($1/3600), int($1%3600/60)}' /proc/uptime
interval = 60
format-prefix = "UpT "
format-prefix-foreground = ${colors.primary}
label = %output%

[module/date]
type = internal/date
interval = 1

date = %I:%M:%S %p | %d,%m,%a
; date = %I:%M:%S %p | %D %
; date-alt = %Y-%m-%d %I:%M:%S %p

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
